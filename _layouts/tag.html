---
layout: page
---

<h1>Tag: {{ page.title }}</h1>
<p class="post-count">{{ page.posts | size }} posts</p>

<ul class="post-list">
  {% for post in page.posts %}
    <li class="post-item">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
  {% endfor %}
</ul>
