# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Seoul

title: Pedro
tagline: Security Note
description: >-
  A minimal, responsive and feature-rich Jekyll theme for technical writing.
avatar: '/assets/img/12.png'

url: 'https://namn20.github.io'
baseurl: ''

github:
  username: namn20

# social 섹션을 비워두거나 아래처럼 최소한으로 유지합니다.
social:
  name: Pedro Yoon
  email: namn20@naver.com
  links:
    - https://github.com/namn20  # 본인 주소 하나만 남겨두세요.

# Web Analytics Settings
analytics:
  google:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 
  matomo:
    id: 
    domain: 
  cloudflare:
    id: 
  fathom:
    id: 

paginate: 10
baseurl: ""

# ------------ 이하 설정은 건드리지 않는 것이 좋습니다 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
